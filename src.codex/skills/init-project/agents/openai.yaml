interface:
  display_name: "Init Project"
  short_description: "Configure project policies and review or update the installed default .agents/.agents-mode.yaml"
  default_prompt: "Use $init-project to configure project policies in the root AGENTS.md and initialize or update .agents/.agents-mode.yaml for the current project. Reuse the installed lead policy catalog and external-dispatch contract, preserve unknown keys in .agents/.agents-mode.yaml, and keep the canonical external routing fields (`consultantMode`, `externalClaudeApiMode`, `delegationMode`, `mcpMode`, `preferExternalWorker`, `preferExternalReviewer`, `externalProvider`, `externalPriorityProfile`, `externalPriorityProfiles`, `externalOpinionCounts`, `externalCodexWorkdirMode`, `externalClaudeWorkdirMode`, `externalGeminiWorkdirMode`, `externalModelMode`, `externalGeminiFallbackMode`, `externalClaudeProfile`) intact unless the user explicitly changes them. Normalize any existing .agents/.agents-mode.yaml file to the current canonical format before presenting or trusting its flags, including refreshing shipped comments and profile/count blocks so `consultantMode` still shows `default: disabled` within `external | internal | disabled` and `externalClaudeApiMode` still shows `default: auto` within `disabled | auto | force`. Modify only the Project policies section plus the local mode file."
