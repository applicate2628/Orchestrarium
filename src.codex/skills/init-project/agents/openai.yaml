interface:
  display_name: "Init Project"
  short_description: "Configure project policies and review or update the installed default .agents/.agents-mode"
  default_prompt: "Use $init-project to configure project policies in the root AGENTS.md and initialize or update .agents/.agents-mode for the current project. Reuse the installed lead policy catalog and external-dispatch contract, preserve unknown keys in .agents/.agents-mode, and keep the canonical external routing fields (`consultantMode`, `delegationMode`, `mcpMode`, `preferExternalWorker`, `preferExternalReviewer`, `externalProvider`, `externalPriorityProfile`, `externalPriorityProfiles`, `externalOpinionCounts`, `externalCodexWorkdirMode`, `externalClaudeWorkdirMode`, `externalGeminiWorkdirMode`, `externalClaudeSecretMode`, `externalClaudeApiMode`, `externalClaudeProfile`) intact unless the user explicitly changes them. Normalize any existing .agents/.agents-mode file to the current canonical format before presenting or trusting its flags, including refreshing shipped comments and profile/count blocks. Modify only the Project policies section plus the local mode file."
