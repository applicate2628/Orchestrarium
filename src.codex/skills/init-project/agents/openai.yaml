interface:
  display_name: "Init Project"
  short_description: "Configure project policies and initialize .agents/.agents-mode"
  default_prompt: "Use $init-project to configure project policies in the root AGENTS.md and initialize or update .agents/.agents-mode for the current project. Reuse the installed lead policy catalog and external-dispatch contract, preserve unknown keys in .agents/.agents-mode, and modify only the Project policies section plus the local mode file."
