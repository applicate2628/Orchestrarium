interface:
  display_name: "Consultant"
  short_description: "Optional independent advisory memo"
  default_prompt: "Use $consultant to provide one non-binding advisory memo for this task. Stay advisory-only, do not route work or gate progress, preserve any existing  fields in .agents/.agents-mode.yaml when consulting the shared dispatch contract, and normalize any existing .agents/.agents-mode.yaml file to the current canonical format before trusting its flags, restoring inline comments so `consultantMode` still marks `disabled` as the default allowed value, `externalClaudeApiMode` still marks `auto` as the default allowed value, and `parallelMode` still marks `auto` as the default allowed value. End the memo with a ready-to-send second prompt for continuing the work. That continuation prompt must begin with a direct imperative to continue and must name the next concrete action."
