interface:
  display_name: "Consultant"
  short_description: "Optional independent advisory memo"
  default_prompt: "Use $consultant to provide one non-binding advisory memo for this task. Stay advisory-only, do not route work or gate progress, preserve any existing delegationMode/mcpMode/preferExternalWorker/preferExternalReviewer/externalProvider/externalClaudeProfile fields in .agents/.agents-mode when consulting the shared dispatch contract, and end the memo with a ready-to-send second prompt for continuing the work. That continuation prompt must begin with a direct imperative to continue and must name the next concrete action."
