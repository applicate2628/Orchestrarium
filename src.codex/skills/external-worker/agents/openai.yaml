interface:
  display_name: "External Worker"
  short_description: "Implement approved work through an external provider"
  default_prompt: "Use $external-worker as the universal external worker-side adapter for the eligible non-owner, non-review role selected by routing. Treat the assigned worker role as provenance only, keep the output inside the approved role contract and change surface, honor externalPriorityProfile/externalPriorityProfiles/externalOpinionCounts when externalProvider is auto, and use $external-brigade when multiple independent external worker items should launch together. Use the shared dispatch contract, and fail fast if the provider is unavailable."
