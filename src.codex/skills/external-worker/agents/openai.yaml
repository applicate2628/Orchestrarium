interface:
  display_name: "External Worker"
  short_description: "Implement approved work through an external provider"
  default_prompt: "Use $external-worker as the universal external worker-side adapter for the eligible non-owner, non-review role selected by routing. Treat the assigned worker role as provenance only, keep the output inside the approved role contract and change surface, honor externalPriorityProfile/externalPriorityProfiles/externalOpinionCounts when externalProvider is auto, use the shared dispatch contract, and fail fast if the provider is unavailable. External means direct provider CLI or approved transport wrapper only: do not satisfy this route by spawning any internal subagent/helper, and treat any provider-labeled internal subagent as an internal-path contract violation."
