consultantMode: disabled  # allowed: external | internal | disabled; default: disabled
externalClaudeApiMode: auto  # allowed when Claude Code is the resolved provider for this run: disabled | auto | force; default: auto
delegationMode: manual  # allowed: manual | auto | force; default: manual
parallelMode: auto  # allowed: manual | auto | force; default: auto
mcpMode: auto  # allowed: auto | force; default: auto
preferExternalWorker: false  # allowed: false | true; default: false
preferExternalReviewer: false  # allowed: false | true; default: false
externalProvider: auto  # allowed here: auto | codex | claude | gemini; default: auto
externalPriorityProfile: balanced  # allowed: balanced | gemini-crosscheck | <repo-local profile>; default: balanced
externalPriorityProfiles:  # allowed: profile -> lane -> ordered provider priority used when externalProvider=auto
  balanced:  # default shared routing profile
    advisory.repo-understanding: [claude, codex, gemini]  # simple admitted advisory rank: claude > codex > gemini
    advisory.design-adr: [claude, codex, gemini]  # design/ADR tradeoff advisory
    review.pre-pr: [claude, codex, gemini]  # pre-PR review and review-side QA
    review.performance-architecture: [claude, codex, gemini]  # performance/architecture review and hot-path cross-check
    worker.default-implementation: [codex, claude, gemini]  # ordinary worker-side implementation
    worker.systems-performance-implementation: [codex, claude, gemini]  # Rust hot path, systems/perf implementation, and media pipeline lane
    worker.long-autonomous: [claude, codex, gemini]  # long-running autonomous worker lane
    worker.ui-structural-modernization: [codex, claude, gemini]  # simple admitted worker rank: codex > claude > gemini
    worker.ui-surgical-patch-cleanup: [codex, claude, gemini]  # exact UI patch, cleanup, and partial-edit correction lane
    worker.visual-icon-decorative: [codex, claude, gemini]  # visual/icon worker lane kept on the worker-side rank
    review.visual: [claude, codex, gemini]  # visual review follows the admitted review/browser rank
  gemini-crosscheck:  # broader Gemini participation in advisory/review routing
    advisory.repo-understanding: [claude, gemini, codex]  # repo/codebase understanding advisory
    advisory.design-adr: [claude, gemini, codex]  # design/ADR tradeoff advisory with Gemini earlier
    review.pre-pr: [claude, gemini, codex]  # pre-PR review with Gemini cross-check earlier
    review.performance-architecture: [claude, codex, gemini]  # performance/architecture review keeps Claude first
    worker.default-implementation: [codex, claude, gemini]  # ordinary worker-side implementation
    worker.systems-performance-implementation: [codex, claude, gemini]  # systems/perf implementation keeps Codex first
    worker.long-autonomous: [claude, codex, gemini]  # cross-check profile no longer elevates Gemini above Codex here
    worker.ui-structural-modernization: [codex, claude, gemini]  # UI worker lanes keep the admitted worker-side rank
    worker.ui-surgical-patch-cleanup: [codex, claude, gemini]  # exact UI patch/cleanup keeps Codex first
    worker.visual-icon-decorative: [codex, claude, gemini]  # visual/icon worker lane keeps the worker-side rank
    review.visual: [claude, codex, gemini]  # visual review no longer elevates Gemini above the admitted browser/review order
externalOpinionCounts:  # allowed: lane -> minimum distinct external opinions required before closure
  advisory.repo-understanding: 1  # repo-understanding advisory opinions
  advisory.design-adr: 1  # design/ADR advisory opinions
  review.pre-pr: 1  # pre-PR review opinions
  review.performance-architecture: 1  # performance/architecture review opinions
  worker.default-implementation: 1  # worker implementation opinions
  worker.systems-performance-implementation: 1  # systems/perf worker opinions
  worker.long-autonomous: 1  # long-autonomous worker opinions
  worker.ui-structural-modernization: 1  # broad UI modernization worker opinions
  worker.ui-surgical-patch-cleanup: 1  # surgical UI patch/cleanup worker opinions
  worker.visual-icon-decorative: 1  # visual/icon/decorative worker opinions
  review.visual: 1  # visual review opinions
externalCodexWorkdirMode: neutral  # allowed: neutral | project; default: neutral
externalClaudeWorkdirMode: neutral  # allowed: neutral | project; default: neutral
externalGeminiWorkdirMode: neutral  # allowed: neutral | project; default: neutral
externalModelMode: runtime-default  # allowed: runtime-default | pinned-top-pro; default: runtime-default
externalGeminiFallbackMode: auto  # allowed when Gemini CLI is the resolved provider for this run: disabled | auto | force; default: auto
